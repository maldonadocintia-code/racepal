name: racepal
description: UK Race & Parkrun social calendar

publish_to: 'none'
version: 0.2.29+30

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # State management
  provider: ^6.1.2

  # UI
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0
  image_picker: ^1.0.7
  timeago: ^3.6.1
  url_launcher: ^6.2.5
  shimmer: ^3.0.0
  table_calendar: ^3.1.2
  googleapis: ^13.2.0
  http: ^1.2.1
  google_maps_flutter: ^2.9.0

  # Utils
  uuid: ^4.3.3
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/parkruns_uk.json
    - assets/manchester_races.json
    - assets/uk_places.json
  fonts:
    - family: BarlowCondensed
      fonts:
        - asset: assets/fonts/BarlowCondensed-ExtraBold.ttf
          weight: 800
    # Space Grotesk ships as a variable font (weight axis 300–700). Flutter
    # selects the weight from the requested fontWeight, so one file covers
    # Regular (400), Medium (500) and Bold (700).
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
